{% extends "layout.html" %} 
{% block "pagecontent" %}
{% if blog%}
<div class="single-blog-container">
    <div class="single-blog-card">
        <h1 class="blog-title">{{ blog.title }}</h1>
        <p class="blog-author">
            By {{ blog.user.first_name }} {{ blog.user.last_name }}
        </p>
        <p class="blog-date">
            Created on {{ blog.created_at }}
        </p>
        <div class="single-blog-image">
            <img src="{{ blog.blog_image.url }}" alt="">
        </div>
        <div class="single-blog-description">
            <p>{{ blog.description }}</p>
        </div>
    </div>
</div>
{% else %}
<h1>No Blog Found</h1>
{% endif %}
{% endblock %}
