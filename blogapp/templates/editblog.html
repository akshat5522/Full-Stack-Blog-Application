{% extends "layout.html" %} 

{% block "pagecontent" %}

<div class="form-container">
    <h2>Create Blog</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="text" name="title" placeholder="Blog Title" value="{{blog.title}}" required>

        <textarea name="description" placeholder="Blog Description" rows="5" required>{{blog.description}}</textarea>
        
        <p>Current Image:</p>
        <img src="{{blog.blog_image.url}}" alt="" width="150">
        
        <input type="file" name="blog_image" required>

        <button type="submit">Update Blog</button>

    </form>
</div>
{% endblock %}
